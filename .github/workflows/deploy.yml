name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node (matches the version used locally)
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build for production (tsc + vite build → dist/)
      - name: Build
        run: npm run build

      # 5. Upload dist/ to Hostinger via FTP
      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:          ${{ secrets.FTP_SERVER }}
          username:        ${{ secrets.FTP_USERNAME }}
          password:        ${{ secrets.FTP_PASSWORD }}
          server-dir:      ${{ secrets.FTP_REMOTE_PATH }}
          local-dir:       ./dist/
          # Only upload files that changed since the last deploy
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
