name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USERNAME }}
          FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 15;
            set net:max-retries 3;
            open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_SERVER\";
            mkdir -p domains/enriquesolis.me/public_html/hooks-lab;
            mirror --reverse --delete --verbose --no-perms --parallel=4 \
              ./dist/ domains/enriquesolis.me/public_html/hooks-lab;
            quit
          "
